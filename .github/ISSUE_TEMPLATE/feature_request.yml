name: Feature request
description: Suggest an idea or improvement.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Ideas are welcome and read — but please treat this as a suggestion, not a request that will be built. Most features won't be, and that's about bandwidth, not the idea.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case or pain point behind the idea.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? An API sketch is welcome.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've tried or thought about.
    validations:
      required: false
