name: Publish

# Publishing is a deliberate act: it fires only when a GitHub Release is
# published (create a v* tag + release). Auth is npm Trusted Publishing —
# npm verifies this repo + workflow over OIDC, so no token exists to leak.
on:
  release:
    types: [published]

permissions:
  contents: read
  # Required for the OIDC exchange and npm provenance attestation.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      # Trusted publishing needs npm 11.5.1+; the node-bundled npm can lag.
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run build
      - run: npm publish --provenance --access public
