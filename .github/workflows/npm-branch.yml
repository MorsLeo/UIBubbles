name: Build npm branch

# Rebuilds packages/core and force-pushes the ready-to-install package (dist
# at the repo root) to the `npm` branch, which consumers depend on via
# `github:MorsLeo/UIBubbles#npm`.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  npm-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build core
        run: |
          npm install --prefix packages/core --no-audit --no-fund
          npm run build --prefix packages/core

      - name: Push built package to npm branch
        # Commits on top of the existing npm branch (no force-push) so commits
        # pinned by consumer lockfiles stay reachable forever.
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          WT="$(mktemp -d)/npm-branch"
          if git fetch origin npm; then
            git worktree add -B npm "$WT" origin/npm
          else
            git worktree add --orphan -b npm "$WT"
          fi
          cd "$WT"
          find . -mindepth 1 -maxdepth 1 -not -name .git -exec rm -rf {} +
          cp -R "$GITHUB_WORKSPACE"/packages/core/package.json \
            "$GITHUB_WORKSPACE"/packages/core/dist \
            "$GITHUB_WORKSPACE"/packages/core/src \
            "$GITHUB_WORKSPACE"/packages/core/LICENSE \
            "$GITHUB_WORKSPACE"/packages/core/README.md \
            "$GITHUB_WORKSPACE"/packages/core/CHANGELOG.md .
          git add -A
          git diff --cached --quiet || git commit -m "build: packages/core @ ${GITHUB_SHA}"
          git push origin npm
